name: Laravel CI

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main", "production" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd
        coverage: none

    - uses: actions/checkout@v4

    - name: Copy .env.testing
      run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

    - name: Configure .env.testing
      run: |
        sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/g' .env.testing
        sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/g' .env.testing
        sed -i 's/DB_PORT=.*/DB_PORT=3306/g' .env.testing
        sed -i 's/DB_DATABASE=.*/DB_DATABASE=testing_db/g' .env.testing
        sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/g' .env.testing
        sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=/g' .env.testing

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate Key
      run: php artisan key:generate --env=testing

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Migrations & Tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: testing_db
        DB_USERNAME: root
        DB_PASSWORD: ""
      run: php artisan test
